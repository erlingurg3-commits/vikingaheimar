<svg viewBox="0 0 900 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Viking World Logo -->
  <defs>
    <style>
      .viking-logo { fill: #b8975a; }
    </style>
  </defs>
  
  <!-- Shield/Circle background -->
  <circle cx="450" cy="400" r="320" class="viking-logo" opacity="0.1"/>
  
  <!-- Top arc -->
  <path d="M 280 250 Q 280 150 450 120 Q 620 150 620 250" class="viking-logo" fill="none" stroke-width="45" stroke-linecap="round"/>
  
  <!-- Left arc -->
  <path d="M 280 250 Q 200 350 250 480" class="viking-logo" fill="none" stroke-width="45" stroke-linecap="round"/>
  
  <!-- Right arc -->
  <path d="M 620 250 Q 700 350 650 480" class="viking-logo" fill="none" stroke-width="45" stroke-linecap="round"/>
  
  <!-- Center vertical spine -->
  <rect x="440" y="120" width="20" height="520" class="viking-logo"/>
  
  <!-- Left sail lines -->
  <g class="viking-logo">
    <path d="M 350 320 L 380 480" fill="none" stroke-width="30" stroke-linecap="round"/>
    <path d="M 320 360 L 360 520" fill="none" stroke-width="28" stroke-linecap="round"/>
    <path d="M 300 400 L 340 560" fill="none" stroke-width="26" stroke-linecap="round"/>
  </g>
  
  <!-- Right sail lines -->
  <g class="viking-logo">
    <path d="M 550 320 L 520 480" fill="none" stroke-width="30" stroke-linecap="round"/>
    <path d="M 580 360 L 540 520" fill="none" stroke-width="28" stroke-linecap="round"/>
    <path d="M 600 400 L 560 560" fill="none" stroke-width="26" stroke-linecap="round"/>
  </g>
  
  <!-- Bottom point -->
  <rect x="440" y="520" width="20" height="120" class="viking-logo"/>
</svg>